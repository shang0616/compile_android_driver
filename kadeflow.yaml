project:
  name: "ci-kade"
  plugin: "kade"

kade:
  config_overrides:
    kernel:
      flavor: "gki"

    gki:
      android_version: ${ANDROID_VERSION}          # ← 只用变量名，不加 :-default
      kernel_version: ${KERNEL_VERSION}
      target_arch: "aarch64"

      kernel:
        repo: ${KERNEL_REPO}
        branch: ${KERNEL_BRANCH}

      driver:
        project_name: "file_copy"
        in_tree: false
        external_src_dir: "${GITHUB_WORKSPACE}/code"
        module_name: "file_copy.ko"
        overwrite: true

      build:
        bazel:
          args: ["--config=fast"]

    non_gki:
      source:
        type: "zip"
        zip_path: "${GITHUB_WORKSPACE}/kernel.zip"
        zip_strip_root: true
      build:
        mode: "script"
        script: "build.sh"
        args: []
        artifacts_dir: "out"

abi:
  upstream_patch: true
  symbols_file: "${GITHUB_WORKSPACE}/abi.symbols"
  sort: false
  replace: false

flow:
  steps:
    - "kade prepare"
    - "kade deps"
    - "kade sync"
    - "kade build"
    - "kade export"
  post_commands: []

artifacts:
  name: "kade-artifacts"
  paths:
    - "${LYENV_HOME}/workspace/exports/**"
    - "${LYENV_HOME}/workspace/**/compile_commands.json"
    - "${GITHUB_WORKSPACE}/img_out/**"
