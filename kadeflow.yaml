project:
  name: "ci-kade"
  plugin: "kade"

kade:
  config_overrides:
    kernel:
      flavor: "gki"

    gki:
      # ✅ 改为环境变量，未设置时使用默认值（以便本地测试）
      android_version: ${ANDROID_VERSION:-14}
      kernel_version: ${KERNEL_VERSION:-6.1}
      target_arch: "aarch64"

      # ✅ 新增：直接指定内核仓库与分支（绕过插件内置映射）
      kernel:
        repo: ${KERNEL_REPO:-https://android.googlesource.com/kernel/common}
        branch: ${KERNEL_BRANCH:-common-android15-6.6}

      driver:
        project_name: "file_copy"          # 你的驱动项目名，可改
        in_tree: false
        external_src_dir: "${GITHUB_WORKSPACE}/code"
        module_name: "lingmou.ko"        # 改成你最终的驱动文件名
        overwrite: true

      build:
        bazel:
          args: ["--config=fast"]

    non_gki:
      source:
        type: "zip"
        zip_path: "${GITHUB_WORKSPACE}/kernel.zip"
        zip_strip_root: true
      build:
        mode: "script"
        script: "build.sh"
        args: []
        artifacts_dir: "out"

abi:
  upstream_patch: true
  symbols_file: "${GITHUB_WORKSPACE}/abi.symbols"
  sort: false
  replace: false

flow:
  steps:
    - "kade prepare"
    - "kade deps"
    - "kade sync"
    - "kade abi_upstream"
    - "kade build"
    - "kade export"
  post_commands: []

artifacts:
  name: "kade-artifacts"
  paths:
    - "${LYENV_HOME}/workspace/exports/**"
    - "${LYENV_HOME}/workspace/**/compile_commands.json"
    - "${GITHUB_WORKSPACE}/img_out/**"
