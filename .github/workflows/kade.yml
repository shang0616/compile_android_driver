name: Build Hook Driver (Multi-Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ... 后面的内容保持不变
          # ============================================
          # ✅ 基准任务：android15-6.6 官方 GKI 编译
          # 用于验证驱动是否只使用了稳定的 KMI 符号
          # 若此版本能编译但无法加载，说明驱动用到了非 KMI 符号
          # ============================================
          - android_version: "15"
            kernel_version: "6.6"
            kernel_repo: "https://android.googlesource.com/kernel/common"
            kernel_branch: "common-android15-6.6"

          # ============================================
          # 🔧 定制内核任务（按需启用）
          # 取消下方注释并填入正确的分支名
          # ============================================
          #
          # # 示例：内核 A（6.6.89-android15-8-g5aOffb447c1d-...）
          # - android_version: "15"
          #   kernel_version: "6.6"
          #   kernel_repo: "https://github.com/xxx/your_kernel_repo"
          #   kernel_branch: "your_kernel_branch_name"
          #
          # # 示例：内核 B（6.6.66-android15-8-g29d86c5fc9dd-...）
          # - android_version: "15"
          #   kernel_version: "6.6"
          #   kernel_repo: "https://github.com/xxx/your_kernel_repo"
          #   kernel_branch: "your_kernel_branch_name"

    env:
      LYENV_HOME: ${{ github.workspace }}/ci-kade
      # lyenv 初始化后，内核源码会放在 ci-kade/workspace/android-kernel 下
      WORKSPACE_DIR: ${{ github.workspace }}/ci-kade/workspace/android-kernel

    steps:
      # ======================
      # 1. 拉取仓库代码
      # ======================
      - name: Checkout 代码
        uses: actions/checkout@v4

      # ======================
      # 2. 安装系统依赖
      # ======================
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y make git curl python3 python3-pip

      # ======================
      # 3. 安装 lyenv
      # ======================
      - name: 安装 lyenv
        run: |
          git clone https://github.com/systemnb/lyenv "${GITHUB_WORKSPACE}/_lyenv"
          cd "${GITHUB_WORKSPACE}/_lyenv"
          make install

      # ======================
      # 4. 安装 Python 依赖
      # ======================
      - name: 安装 Python 依赖
        run: python3 -m pip install --user pyyaml

      # ======================
      # 5. 恢复缓存：内核源码仓库（.repo）
      # ======================
      - name: Restore Kernel Repo Cache
        uses: actions/cache/restore@v4
        id: cache-repo
        with:
          path: |
            ${{ env.WORKSPACE_DIR }}/.repo
            ${{ env.WORKSPACE_DIR }}/.superproject
          key: ${{ runner.os }}-repo-${{ hashFiles('kadeflow.yaml') }}
     - name: "DEBUG: Print repo cache hit"
        run: echo "Repo cache hit: ${{ steps.cache-repo.outputs.cache-hit }}"

      # ======================
      # 6. 恢复缓存：预编译工具链
      # ======================
      - name: "DEBUG: Print prebuilts cache hit"
        uses: actions/cache/restore@v4
        id: cache-prebuilts
        with:
          path: |
            ${{ env.WORKSPACE_DIR }}/prebuilts/clang
            ${{ env.WORKSPACE_DIR }}/prebuilts/rust
            ${{ env.WORKSPACE_DIR }}/prebuilts/build-tools
          key: ${{ runner.os }}-prebuilts-${{ hashFiles('kadeflow.yaml') }}
      - name: DEBUG: Print prebuilts cache hit
        run: echo "Prebuilts cache hit: ${{ steps.cache-prebuilts.outputs.cache-hit }}"

      # ======================
      # 7. 编译驱动
      # ======================
      - name: 编译驱动 (Android ${{ matrix.android_version }})
        env:
          ANDROID_VERSION: ${{ matrix.android_version }}
          KERNEL_VERSION: ${{ matrix.kernel_version }}
          KERNEL_REPO: ${{ matrix.kernel_repo }}
          KERNEL_BRANCH: ${{ matrix.kernel_branch }}
        run: |
          # 检查缓存是否已恢复（调试用）
          ls -la ${{ env.WORKSPACE_DIR }}/.repo/projects 2>/dev/null || echo "Repo cache not restored"
          ls -la ${{ env.WORKSPACE_DIR }}/prebuilts/clang 2>/dev/null || echo "Prebuilts cache not restored"

          PROJECT="ci-kade"
          lyenv create "${PROJECT}"
          cd "${PROJECT}"
          lyenv init .
          eval "$(lyenv activate)"
          python3 "${GITHUB_WORKSPACE}/.github/scripts/run_kadeflow.py" \
            --config "${GITHUB_WORKSPACE}/kadeflow.yaml"

      # ======================
      # 8. 上传编译产物
      # ======================
      - name: 上传编译产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hook_driver_Android${{ matrix.android_version }}
          path: |
            ${{ github.workspace }}/ci-kade/workspace/exports/**
            ${{ github.workspace }}/img_out/**

      # ======================
      # 9. 保存缓存：内核源码仓库（.repo）
      # ======================
      - name: Save Kernel Repo Cache
        uses: actions/cache/save@v4
        if: always()                     # 即使编译失败也保存，避免下次又重复下载
        with:
          path: |
            ${{ env.WORKSPACE_DIR }}/.repo
            ${{ env.WORKSPACE_DIR }}/.superproject
          key: ${{ steps.cache-repo.outputs.cache-primary-key }}

      # ======================
      # 10. 保存缓存：预编译工具链
      # ======================
      - name: Save Prebuilts Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            ${{ env.WORKSPACE_DIR }}/prebuilts/clang
            ${{ env.WORKSPACE_DIR }}/prebuilts/rust
            ${{ env.WORKSPACE_DIR }}/prebuilts/build-tools
          key: ${{ steps.cache-prebuilts.outputs.cache-primary-key }}
