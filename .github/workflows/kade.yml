name: Build Hook Driver (Multi-Android)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - android_version: "14"
            kernel_version: "6.1"
            kernel_repo: "https://android.googlesource.com/kernel/common"
            kernel_branch: "android14-6.1"

          - android_version: "15"
            kernel_version: "6.6"
            kernel_repo: "https://android.googlesource.com/kernel/common"
            kernel_branch: "common-android15-6.6"

          -

    env:
      LYENV_HOME: ${{ github.workspace }}/ci-kade

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y make git curl python3 python3-pip

      - name: 安装 lyenv
        run: |
          git clone https://github.com/systemnb/lyenv "${GITHUB_WORKSPACE}/_lyenv"
          cd "${GITHUB_WORKSPACE}/_lyenv"
          make install

      - name: 安装 Python 依赖
        run: python3 -m pip install --user pyyaml

      - name: 编译驱动 (Android ${{ matrix.android_version }})
        env:
          ANDROID_VERSION: ${{ matrix.android_version }}
          KERNEL_VERSION: ${{ matrix.kernel_version }}
          KERNEL_REPO: ${{ matrix.kernel_repo }}
          KERNEL_BRANCH: ${{ matrix.kernel_branch }}
        run: |
          PROJECT="ci-kade"
          lyenv create "${PROJECT}"
          cd "${PROJECT}"
          lyenv init .
          eval "$(lyenv activate)"
          python3 "${GITHUB_WORKSPACE}/.github/scripts/run_kadeflow.py" \
            --config "${GITHUB_WORKSPACE}/kadeflow.yaml"

      - name: 上传编译产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hook_driver_Android${{ matrix.android_version }}
          path: |
            ${{ github.workspace }}/ci-kade/workspace/exports/**
            ${{ github.workspace }}/img_out/**
