name: Build Hook Driver (Multi-Android)

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Android 14
          - android_version: "14"
            kernel_version: "6.1"
            kernel_repo: "https://android.googlesource.com/kernel/common"
            kernel_branch: "android14-6.1"

          # Android 15
          - android_version: "15"
            kernel_version: "6.6"
            kernel_repo: "https://android.googlesource.com/kernel/common"
            kernel_branch: "common-android15-6.6"

          # Android 16
          - android_version: "16"
            kernel_version: "6.12"
            kernel_repo: "https://android.googlesource.com/kernel/common"
            kernel_branch: "common-android16-6.12"

    env:
      LYENV_HOME: ${{ github.workspace }}/.lyenv_home  # 定义 lyenv 安装路径

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y make git curl python3 python3-pip

      # ---------- 修复点：从源码安装 lyenv ----------
      - name: 安装 lyenv
        run: |
          mkdir -p "${LYENV_HOME}"
          # 克隆 lyenv 源码
          git clone https://github.com/systemnb/lyenv "${GITHUB_WORKSPACE}/_lyenv"
          cd "${GITHUB_WORKSPACE}/_lyenv"
          # 编译并安装
          make install
      # --------------------------------------------

      - name: 安装 Python 依赖
        run: |
          python3 -m pip install --user pyyaml

      - name: 编译驱动 (Android ${{ matrix.android_version }})
        env:
          ANDROID_VERSION: ${{ matrix.android_version }}
          KERNEL_VERSION: ${{ matrix.kernel_version }}
          KERNEL_REPO: ${{ matrix.kernel_repo }}
          KERNEL_BRANCH: ${{ matrix.kernel_branch }}
        run: |
          # 创建并初始化项目环境
          PROJECT="ci-kade"
          lyenv create "${PROJECT}"
          cd "${PROJECT}"
          lyenv init .
          # 激活 lyenv 环境
          eval "$(lyenv activate)"
          # 运行主程序
          python3 "${GITHUB_WORKSPACE}/.github/scripts/run_kadeflow.py" \
            --config "${GITHUB_WORKSPACE}/kadeflow.yaml"

      - name: 上传编译产物
        if: always()  # 即使编译失败也尝试上传日志
        uses: actions/upload-artifact@v4
        with:
          name: hook_driver_Android${{ matrix.android_version }}
          path: |
            ${{ github.workspace }}/ci-kade/workspace/exports/**
            ${{ github.workspace }}/ci-kade/workspace/**/compile_commands.json
            ${{ github.workspace }}/img_out/**
