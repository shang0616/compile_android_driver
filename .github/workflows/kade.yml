name: Build Hook Driver for Multiple Kernels

on:
  workflow_dispatch:   # 允许手动触发
    inputs:
      a      android_version:
        description: 'Android 版本'
        required: true
        default: '13'
        type: choice
        options:
          - '9'
          - '10'
          - '11'
          - '12'
          - '13'
          - '14'
          - '15'    # ✅ 加上
          - '16'    # ✅ 加上

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false    # 一个版本失败不影响其他版本继续编译
      matrix:
        kernel_version: ["5.10", "6.1", "6.6"]   # 你要编译的三个内核版本

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      # 这里假设你的项目已经内置了编译脚本，我们直接调用原有逻辑
      - name: 编译驱动 (${{ matrix.kernel_version }})
        env:
          ANDROID_VERSION: ${{ github.event.inputs.android_version }}
          KERNEL_VERSION: ${{ matrix.kernel_version }}
          DRIVER_NAME: "lingmou.ko"     # ✅ 改成你最终的驱动文件名
          ARCH: "aarch64"
        run: |
          # 根据项目实际脚本调整，以下为通用示例
          # 如果项目中有专门的编译脚本，比如 ./build.sh，可以直接调用
          # 否则，直接使用 Kade 原有的构建命令（请参考你的项目 README）
          echo "开始编译 Android $ANDROID_VERSION, 内核 $KERNEL_VERSION, 驱动 $DRIVER_NAME"
          # 下面这行是示意，请替换为项目真正的编译命令
          # 例如：bash build.sh $ANDROID_VERSION $KERNEL_VERSION $DRIVER_NAME $ARCH
          # 如果你的项目使用 docker，也可以用类似下面方式运行
          # docker run ... -e KVER=$KERNEL_VERSION ...

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: hook_driver_${{ matrix.kernel_version }}   # 每个版本单独打包
          path: |
            *.ko
            # 如果驱动在其他子目录，请填写正确路径，例如 code/*.ko
