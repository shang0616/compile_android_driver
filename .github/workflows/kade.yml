name: Build Hook Driver (Multi-Android)

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Android 14 – 常用内核分支
          - android_version: "14"
            kernel_version: "6.1"
            kernel_repo: "https://android.googlesource.com/kernel/common"
            kernel_branch: "android14-6.1"

          # Android 15 – 官方 GKI 分支
          - android_version: "15"
            kernel_version: "6.6"
            kernel_repo: "https://android.googlesource.com/kernel/common"
            kernel_branch: "common-android15-6.6"

        

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 编译驱动 (Android ${{ matrix.android_version }} | 内核 ${{ matrix.kernel_branch }})
        env:
          # 传递给 kadeflow.yaml / kade 插件的环境变量
          ANDROID_VERSION: ${{ matrix.android_version }}
          KERNEL_VERSION: ${{ matrix.kernel_version }}
          KERNEL_REPO: ${{ matrix.kernel_repo }}
          KERNEL_BRANCH: ${{ matrix.kernel_branch }}
        run: |
          python3 .github/scripts/run_kadeflow.py --config kadeflow.yaml

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: hook_driver_Android${{ matrix.android_version }}
          path: |
            *.ko
            # 若产物在别的路径，请修改，例如：
            # ${LYENV_HOME}/workspace/exports/**
